name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Disable code signing
        run: node -e "const p=require('./package.json');delete p.build.win.signtoolOptions;require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Package
        run: npm run package

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: WarcraftRecorder-Setup
          path: release/build/*.exe
          if-no-files-found: error
